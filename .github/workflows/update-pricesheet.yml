name: Update Pricesheet JSON

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install xlsx
        run: npm install xlsx

      - name: Run conversion script
        run: node scripts/excelParser.js

      - name: Commit and push products.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/products.json
          git diff --staged --quiet || git commit -m "chore: update products.json [$(date +'%Y-%m-%d')]"
          git push